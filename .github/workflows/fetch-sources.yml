name: fetch-sources

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated list of sources to fetch'
        required: false
        default: 'all'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Fetch latest data
        run: |
          bundle exec ammitto fetch ${{ github.event.inputs.sources != 'all' && github.event.inputs.sources || '' }} --verbose
        continue-on-error: true

      - name: Process data
        run: bundle exec ammitto process --verbose
        continue-on-error: true

      - name: Export JSON-LD
        run: bundle exec ammitto export jsonld --output-dir ./data/api/v1 --verbose

      - name: Generate all formats
        run: |
          bundle exec ammitto export ttl --output-dir ./data/api/v1
          bundle exec ammitto export nt --output-dir ./data/api/v1
        continue-on-error: true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/api/v1
          git diff --quiet && git diff --staged --quiet || git commit -m "chore(data): update sanctions data $(date '+%Y-%m-%d')"

      - name: Push changes
        run: git push
        if: success()
